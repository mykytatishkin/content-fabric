<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UpCast{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .layout { display: flex; min-height: 100vh; padding: 8px; gap: 0; }

        /* ── Sidebar wrapper (fixed, always visible) ── */
        .sidebar-wrapper {
            position: fixed;
            top: 8px;
            left: 8px;
            bottom: 8px;
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #ebebed;
            border-radius: 8px;
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
            z-index: 10;
            overflow: hidden;
        }

        /* Spacer to push main content right */
        .sidebar-spacer {
            width: 220px;
            flex-shrink: 0;
        }

        /* ── Sidebar ── */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #000;
        }

        .sidebar-logo {
            padding: 1rem 1rem 0.7rem;
        }

        .sidebar nav { padding: 0.2rem 0.5rem; flex: 1; overflow-y: auto; }

        .sidebar a {
            display: block;
            padding: 0.4rem 0.75rem;
            color: #5c5c60;
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            border-radius: 16px;
            margin-bottom: 1px;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
        }

        .sidebar a:hover {
            background: rgba(0,0,0,0.04);
            color: #000;
        }

        .sidebar a.active {
            background: rgba(0,0,0,0.06);
            color: #000;
            font-weight: 500;
        }

        .sidebar-section {
            padding: 0.6rem 0.75rem 0.25rem;
            font-size: 11px;
            font-weight: 600;
            color: #9a9996;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.075);
        }

        .user-info {
            padding: 0.6rem 0.75rem;
            font-size: 12px;
            color: #858587;
        }
        .user-info strong { color: #000; display: block; margin-bottom: 2px; font-weight: 500; font-size: 12px; }
        .user-info a { color: #858587; font-size: 11px; text-decoration: none; }
        .user-info a:hover { color: #5c5c60; }

        /* ── Main ── */
        .main {
            flex: 1;
            padding: 2rem 2.5rem;
            overflow-x: auto;
            max-width: 1000px;
            background: #fff;
            margin-left: 16px;
        }

        .main h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #000;
        }

        .main h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #000;
        }

        .main p { color: #5c5c60; }

        /* ── Cards ── */
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 0.95rem 1.1rem;
            border: 1px solid rgba(0,0,0,0.075);
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .card:hover {
            transform: translateY(-1px);
            box-shadow: rgba(0,0,0,0.1) 0px 14px 28px -4px, rgba(0,0,0,0.06) 0px 10px 20px -4px;
        }
        .card .label { font-size: 11px; color: #9a9996; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
        .card .value { font-size: 1.4rem; font-weight: 600; margin-top: 0.2rem; color: #000; }

        /* ── Tables ── */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.075);
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
        }
        th, td { text-align: left; padding: 0.55rem 0.8rem; font-size: 13px; }
        th { background: #f3f3f5; font-weight: 500; color: #9a9996; border-bottom: 1px solid rgba(0,0,0,0.075); font-size: 12px; }
        td { border-bottom: 1px solid rgba(0,0,0,0.04); color: #000; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f3f3f5; }
        td a { color: rgb(74, 213, 95); text-decoration: none; font-weight: 500; }
        td a:hover { text-decoration: underline; }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-green { background: rgba(74,213,95,0.15); color: #1a8f2d; }
        .badge-red { background: rgba(254,112,112,0.15); color: #c0392b; }
        .badge-yellow { background: rgba(224,205,99,0.15); color: #8a7a00; }
        .badge-blue { background: rgba(106,173,250,0.15); color: #2b60a0; }
        .badge-gray { background: rgba(0,0,0,0.04); color: #77767b; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border-radius: 100vh;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid rgba(0,0,0,0.075);
            cursor: pointer;
            font-family: inherit;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: rgba(0,0,0,0.04) 0px 2px 8px -2px;
        }
        .btn-primary {
            background: rgb(74, 213, 95);
            color: #fff;
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
        }
        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 6px 28px rgba(0,0,0,0.1);
        }
        .btn-danger {
            background: rgb(254, 112, 112);
            color: #fff;
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
        }
        .btn-danger:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }
        .btn-sm { padding: 0.22rem 0.55rem; font-size: 11px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }

        /* ── Forms ── */
        .form-group { margin-bottom: 0.85rem; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 0.3rem; color: #5c5c60; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem 0.7rem;
            border: 1px solid rgba(0,0,0,0.075);
            border-radius: 16px;
            font-size: 13px;
            background: #fff;
            color: #000;
            font-family: inherit;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.075);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: rgba(74,213,95,0.5);
            box-shadow: 0 0 0 3px rgba(74,213,95,0.15), inset 0 0 0 1px rgba(74,213,95,0.3);
        }
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: #9a9996;
        }

        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(0,0,0,0.075);
            max-width: 600px;
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
        }

        /* ── Alerts ── */
        .alert { padding: 0.6rem 0.85rem; border-radius: 16px; margin-bottom: 1rem; font-size: 13px; }
        .alert-error { background: rgba(254,112,112,0.1); color: #c0392b; border: 1px solid rgba(254,112,112,0.15); }
        .alert-success { background: rgba(74,213,95,0.1); color: #1a8f2d; border: 1px solid rgba(74,213,95,0.15); }

        .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: end; }
        .filter-bar .form-group { margin-bottom: 0; }
        .filter-bar select { min-width: 140px; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        @media (max-width: 768px) {
            .sidebar-wrapper { display: none; }
            .sidebar-spacer { display: none; }
            .main { padding: 1rem; margin-left: 0; }
            .cards { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar-wrapper">
        <div class="sidebar">
            <div class="sidebar-logo">
                <img src="/static/img/upcast-logo.svg" alt="UpCast" style="height:24px;opacity:0.85;">
            </div>
            <nav>
                <div class="sidebar-section">Main</div>
                <a href="/app/" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
                <a href="/app/channels" class="{{ 'active' if active == 'channels' }}">Channels</a>
                <a href="/app/tasks" class="{{ 'active' if active == 'tasks' }}">Tasks</a>
                <a href="/app/templates" class="{{ 'active' if active == 'templates' }}">Templates</a>
                <a href="/app/analytics" class="{{ 'active' if active == 'analytics' }}">Analytics</a>

                <div class="sidebar-section" style="margin-top:0.6rem;">Tools</div>
                <a href="/app/voice" class="{{ 'active' if active == 'voice' }}">Voice</a>
                <a href="/app/reauth" class="{{ 'active' if active == 'reauth' }}">Auth</a>
                <a href="/app/totp" class="{{ 'active' if active == 'totp' }}">TOTP</a>
                <a href="/app/settings" class="{{ 'active' if active == 'settings' }}">Settings</a>

                {% if user and user.status == 1 %}
                <div class="sidebar-section" style="margin-top:0.6rem;">Admin</div>
                <a href="/panel/">Admin Panel</a>
                {% endif %}
            </nav>
            <div class="sidebar-bottom">
                <div class="user-info">
                    <strong>{{ user.display_name if user else 'Guest' }}</strong>
                    {{ user.email if user else '' }}
                    <br><a href="/app/logout">Logout</a>
                </div>
            </div>
        </div>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="main">
            {% block content %}{% endblock %}
        </div>
    </div>
<script src="/static/js/table-sort.js?v=1"></script>
</body>
</html>
