<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — aiyoutube</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            background: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
        }
        .layout { display: flex; min-height: 100vh; padding: 8px; }

        .sidebar-wrapper {
            position: fixed;
            top: 8px;
            left: 8px;
            bottom: 8px;
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #ebebed;
            border-radius: 8px;
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
            z-index: 10;
            overflow: hidden;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #000;
        }

        .sidebar-spacer { width: 220px; flex-shrink: 0; }

        .sidebar-logo { padding: 1rem 1rem 0.7rem; }
        .sidebar nav { padding: 0.2rem 0.5rem; flex: 1; overflow-y: auto; }
        .sidebar a {
            display: block;
            padding: 0.4rem 0.75rem;
            color: #5c5c60;
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            border-radius: 16px;
            margin-bottom: 1px;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .sidebar a:hover { background: rgba(0,0,0,0.04); color: #000; }
        .sidebar a.active { background: rgba(0,0,0,0.06); color: #000; font-weight: 500; }
        .sidebar-section { padding: 0.6rem 0.75rem 0.25rem; font-size: 11px; font-weight: 600; color: #9a9996; text-transform: uppercase; letter-spacing: 0.04em; }

        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.075);
            padding: 0.5rem;
        }
        .sidebar-bottom a {
            display: block;
            padding: 0.4rem 0.75rem;
            color: #E08A3C;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-radius: 16px;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .sidebar-bottom a:hover { background: rgba(224,138,60,0.08); }

        .main {
            flex: 1;
            padding: 2rem 2.5rem;
            overflow-x: auto;
            margin-left: 16px;
        }
        .main h2 { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: #000; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 0.95rem 1.1rem;
            border: 1px solid rgba(0,0,0,0.075);
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
        }
        .card .label { font-size: 11px; color: #9a9996; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
        .card .value { font-size: 1.4rem; font-weight: 600; margin-top: 0.2rem; color: #000; }

        .table-wrap {
            width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;
            border-radius: 16px; border: 1px solid rgba(0,0,0,0.075);
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
            margin-bottom: 1rem;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; }
        .table-wrap table { border: none; box-shadow: none; border-radius: 0; }
        th, td { text-align: left; padding: 0.55rem 0.8rem; font-size: 13px; white-space: nowrap; }
        th { background: #f3f3f5; font-weight: 500; color: #9a9996; border-bottom: 1px solid rgba(0,0,0,0.075); font-size: 12px; }
        td { border-bottom: 1px solid rgba(0,0,0,0.04); color: #000; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f3f3f5; }
        td.wrap, th.wrap { white-space: normal; min-width: 120px; }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 500; }
        .badge-green { background: rgba(224,138,60,0.15); color: #1a8f2d; }
        .badge-red { background: rgba(254,112,112,0.15); color: #c0392b; }
        .badge-yellow { background: rgba(224,205,99,0.15); color: #8a7a00; }
        .badge-blue { background: rgba(106,173,250,0.15); color: #2b60a0; }
        .badge-gray { background: rgba(0,0,0,0.04); color: #77767b; }

        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border-radius: 100vh;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.075);
            font-family: inherit;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: rgba(0,0,0,0.04) 0px 2px 8px -2px;
        }
        .btn-primary {
            background: #E08A3C;
            color: #fff;
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
        }
        .btn-primary:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .btn-danger {
            background: rgb(254, 112, 112);
            color: #fff;
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
        }
        .btn-danger:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .btn-sm { padding: 0.22rem 0.55rem; font-size: 11px; }

        .alert { padding: 0.6rem 0.85rem; border-radius: 16px; margin-bottom: 1rem; font-size: 13px; }
        .alert-info { background: rgba(106,173,250,0.1); color: #2b60a0; border: 1px solid rgba(106,173,250,0.15); }
        .alert-warn { background: rgba(224,205,99,0.1); color: #8a7a00; border: 1px solid rgba(224,205,99,0.15); }
        .stub-notice { background: rgba(224,205,99,0.1); border: 1px dashed rgba(224,205,99,0.4); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; font-size: 13px; color: #8a7a00; }
        .stub-notice strong { color: #5a4a00; }
        .section { margin-bottom: 1.5rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 100;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }
        .mobile-header-logo { display: flex; align-items: center; gap: 8px; }
        .mobile-header-logo span { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; color: #1d1d1f; }
        .hamburger { width: 36px; height: 36px; border: none; background: none; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 160ms; }
        .hamburger:hover { background: rgba(0,0,0,0.05); }
        .hamburger svg { display: block; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; opacity: 0; transition: opacity 250ms; }
        .sidebar-overlay.open { opacity: 1; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            body { padding-top: 52px; }
            .sidebar-wrapper {
                position: fixed; top: 0; left: 0; bottom: 0;
                width: 270px;
                transform: translateX(-100%);
                transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
                z-index: 300; border-radius: 0; box-shadow: none;
            }
            .sidebar-wrapper.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
            .sidebar-spacer { display: none; }
            .layout { padding: 0; }
            .main { margin-left: 0; padding: 1rem; }
            .cards { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .table-wrap { border-radius: 0; margin-left: -1rem; margin-right: -1rem; width: calc(100% + 2rem); border-left: none; border-right: none; }
            th, td { padding: 0.5rem 0.6rem; font-size: 12px; }
            .hide-mobile { display: none; }
        }
        @media (max-width: 480px) {
            .cards { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div class="mobile-header">
    <div class="mobile-header-logo">
        <img src="/static/img/upcast-logo.svg?v=7" alt="aiyoutube" style="height:22px;">
        <span>aiyoutube</span>
    </div>
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1d1d1f" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="layout">
    <div class="sidebar-wrapper" id="sidebarWrapper">
    <div class="sidebar">
        <div class="sidebar-logo">
            <div style="display:flex;align-items:center;gap:8px;">
                <img src="/static/img/upcast-logo.svg?v=7" alt="aiyoutube" style="height:24px;">
                <span style="font-size:17px;font-weight:600;letter-spacing:-0.4px;color:#1d1d1f;">aiyoutube</span>
            </div>
        </div>
        <nav>
            <div class="sidebar-section">Overview</div>
            <a href="/panel/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <div class="sidebar-section" style="margin-top:0.6rem;">Manage</div>
            <a href="/panel/channels" class="{% if active == 'channels' %}active{% endif %}">Channels</a>
            <a href="/panel/tasks" class="{% if active == 'tasks' %}active{% endif %}">Tasks</a>
            <a href="/panel/users" class="{% if active == 'users' %}active{% endif %}">Users</a>
            <a href="/panel/credentials" class="{% if active == 'credentials' %}active{% endif %}">Credentials</a>
            <a href="/panel/payment" class="{% if active == 'payment' %}active{% endif %}">Payment</a>
            <a href="/panel/broadcast" class="{% if active == 'broadcast' %}active{% endif %}">Broadcast</a>
            <div class="sidebar-section" style="margin-top:0.6rem;">System</div>
            <a href="/panel/health" class="{% if active == 'health' %}active{% endif %}">Health</a>
            <a href="/panel/logs" class="{% if active == 'logs' %}active{% endif %}">Logs</a>
            <a href="/docs">API Docs</a>
        </nav>
        <div class="sidebar-bottom">
            <a href="/app/">Back to App</a>
        </div>
    </div>
    </div>
    <div class="sidebar-spacer"></div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</div>
{% block scripts %}{% endblock %}
<script>
function toggleSidebar(){
    var w=document.getElementById('sidebarWrapper'),o=document.getElementById('sidebarOverlay');
    var open=w.classList.toggle('open');
    if(open){o.style.display='block';setTimeout(function(){o.classList.add('open')},10)}
    else{o.classList.remove('open');setTimeout(function(){o.style.display='none'},250)}
}
</script>
</body>
</html>
