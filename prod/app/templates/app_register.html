<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — UpCast</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            background: #ebebed;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(0,0,0,0.075);
            box-shadow: rgba(0,0,0,0.08) 0px 12px 24px -4px, rgba(0,0,0,0.04) 0px 8px 16px -4px;
        }
        .login-card p { font-size: 13px; color: #858587; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 0.9rem; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 0.3rem; color: #5c5c60; }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid rgba(0,0,0,0.075);
            border-radius: 16px;
            font-size: 13px;
            background: #fff;
            color: #000;
            font-family: inherit;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.075);
        }
        .form-group input::placeholder { color: #9a9996; }
        .form-group input:focus {
            outline: none;
            border-color: rgba(74,213,95,0.5);
            box-shadow: 0 0 0 3px rgba(74,213,95,0.15), inset 0 0 0 1px rgba(74,213,95,0.3);
        }
        .btn {
            width: 100%;
            padding: 0.65rem;
            border-radius: 100vh;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 160ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .btn-primary {
            background: rgb(74, 213, 95);
            color: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 4px 24px rgba(0,0,0,0.075);
        }
        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 0 1px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.8), 0 6px 28px rgba(0,0,0,0.1);
        }
        .alert-error {
            background: rgba(254,112,112,0.1);
            color: #c0392b;
            border: 1px solid rgba(254,112,112,0.15);
            padding: 0.55rem 0.75rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            font-size: 13px;
        }
        .links { text-align: center; margin-top: 1.2rem; font-size: 13px; color: #858587; }
        .links a { color: rgb(74, 213, 95); text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="margin-bottom:0.6rem;text-align:center;">
            <img src="/static/img/upcast-logo.svg" alt="UpCast" style="height:32px;">
        </div>
        <p style="text-align:center;">Create a new account</p>

        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/app/register">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" name="display_name" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="links">
            Already have an account? <a href="/app/login">Sign In</a>
        </div>
    </div>
</body>
</html>
