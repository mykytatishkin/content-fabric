upstream cff_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ── Rate limiting (mitigates vuln scanners) ───────────────────────────
# /var/log/cff-api.log on 2026-05-09 had 600 requests from 151.243.150.23
# and 122 from 192.253.248.169 — all 404 probes for .env, wp-config.php,
# /.git/HEAD, etc.  These should never reach uvicorn.
#
# ``limit_req_zone`` is module-level (must be in ``http {}``).  Place these
# in /etc/nginx/conf.d/cff-rate-limit.conf or include this whole file from
# nginx.conf — see deploy/nginx/README.md.
limit_req_zone $binary_remote_addr zone=cff_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cff_login:10m   rate=5r/m;
limit_req_status 429;

server {
    listen 46.21.250.43:80 default_server;
    server_name 46.21.250.43 46.21.250.43.nip.io _;

    # Logging
    access_log /var/log/nginx/cff-access.log;
    error_log /var/log/nginx/cff-error.log warn;

    # Security headers (supplement app-level headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Timeouts
    client_max_body_size 10G;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Health check — bypass proxy for monitoring
    location /health {
        proxy_pass http://cff_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static assets (if any)
    location /static/ {
        alias /opt/content-fabric/prod/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API and app
    # Block /metrics from public — Prometheus scrapes 127.0.0.1:8000/metrics directly
    location = /metrics {
        allow 127.0.0.1;
        deny all;
    }

    # Vulnerability-scanner short-circuit — drop the connection for paths
    # that have no business hitting an FastAPI app.  Saves ~700 req/day of
    # noise in /var/log/cff-api.log without extra wakeups in uvicorn.
    location ~* (?:^/(?:\.env|\.git|wp-(?:admin|login|config|includes)|wordpress|xmlrpc\.php|phpmyadmin|phpinfo|pma|adminer|server-status|server-info|drupal|joomla|sftp-config|configuration\.php|config\.json|config\.yml|database\.yml|local_settings\.py|settings\.py|secrets\.json|web\.config|composer\.(?:json|lock))(?:/|$)|\.(?:env\.[a-z]+|sql|sqlite|backup|bak|old|swp)$) {
        access_log off;
        return 444;  # close connection without response
    }

    # Login endpoints — strict per-IP rate limit (5/min)
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password)$ {
        limit_req zone=cff_login burst=5 nodelay;
        proxy_pass http://cff_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        # 30r/s sustained, burst 60 — covers panel polling without
        # affecting legitimate users.
        limit_req zone=cff_general burst=60 nodelay;

        proxy_pass http://cff_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Buffering for large uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
