upstream cff_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 46.21.250.43:80 default_server;
    server_name 46.21.250.43 _;

    # Logging
    access_log /var/log/nginx/cff-access.log;
    error_log /var/log/nginx/cff-error.log warn;

    # Security headers (supplement app-level headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Timeouts
    client_max_body_size 10G;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Health check — bypass proxy for monitoring
    location /health {
        proxy_pass http://cff_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static assets (if any)
    location /static/ {
        alias /opt/content-fabric/prod/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API and app
    location / {
        proxy_pass http://cff_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Buffering for large uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
