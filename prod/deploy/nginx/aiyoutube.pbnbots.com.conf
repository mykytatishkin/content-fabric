server {
    server_name aiyoutube.pbnbots.com;
    listen 46.21.250.43:443 ssl;

    ssl_certificate "/var/www/httpd-cert/aiyoutube.pbnbots.com_2025-10-04-13-20_13.crt";
    ssl_certificate_key "/var/www/httpd-cert/aiyoutube.pbnbots.com_2025-10-04-13-20_13.key";
    add_header Strict-Transport-Security "max-age=31536000" always;

    http2 on;

    charset utf-8;
    gzip on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/css text/xml application/javascript text/plain application/json image/svg+xml image/x-icon;
    gzip_comp_level 5;

    client_max_body_size 10G;
    # Block /metrics from public — Prometheus scrapes 127.0.0.1:8000/metrics directly
    location = /metrics {
        allow 127.0.0.1;
        deny all;
    }



    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
    }

    include /etc/nginx/fastpanel2-includes/*.conf;

    error_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.error.log;
    access_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.access.log;
}

server {
    server_name aiyoutube.pbnbots.com;
    listen 46.21.250.43:80;
    return 301 https://$host$request_uri;

    error_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.error.log;
    access_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.access.log;
}

server {
    server_name www.aiyoutube.pbnbots.com;
    listen 46.21.250.43:80;
    listen 46.21.250.43:443 ssl;

    ssl_certificate "/var/www/httpd-cert/aiyoutube.pbnbots.com_2025-10-04-13-20_13.crt";
    ssl_certificate_key "/var/www/httpd-cert/aiyoutube.pbnbots.com_2025-10-04-13-20_13.key";
    add_header Strict-Transport-Security "max-age=31536000" always;

    http2 on;
    return 301 $scheme://aiyoutube.pbnbots.com$request_uri;

    error_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.error.log;
    access_log /var/www/fastuser/data/logs/aiyoutube.pbnbots.com-frontend.access.log;
}
