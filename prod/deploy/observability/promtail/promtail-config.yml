server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ─── CFF application file logs ──────────────────────────────────────
  # Most cff-* services write to /var/log/cff-*.log via systemd
  # StandardOutput=append:. journald never sees them, so scrape direct.
  - job_name: cff-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: cff-files
          __path__: /var/log/cff-*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '/var/log/(?P<unit>cff-[^/]+)\.log$'
      - labels:
          unit:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            task_id: task_id
            logger: logger
            message: message
      - labels:
          level:
          trace_id:
          task_id:
      - match:
          selector: '{job="cff-files"} !~ "^\\{"'
          stages:
            - regex:
                expression: 'trace=(?P<trace_id>[0-9a-f]{16,32}|-)'
            - regex:
                expression: 'task=(?P<task_id>\d+|-)'
            - regex:
                expression: '\b(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\b'
            - labels:
                trace_id:
                task_id:
                level:

  # ─── systemd journal — cff-* + stream-* ─────────────────────────────
  - job_name: systemd-journal
    journal:
      max_age: 12h
      json: true
      labels:
        job: systemd-journal
      path: /var/log/journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_priority_keyword']
        target_label: severity
      - source_labels: ['__journal__hostname']
        target_label: host
      - source_labels: ['__journal_syslog_identifier']
        target_label: identifier
      - source_labels: ['unit']
        regex: '(cff-.*|stream-.*)'
        action: keep
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            task_id: task_id
            logger: logger
            message: message
      - labels:
          level:
          trace_id:
          task_id:
          logger:
      - match:
          selector: '{job="systemd-journal"} !~ "^\\{"'
          stages:
            - regex:
                expression: 'trace=(?P<trace_id>[0-9a-f]{16,32})'
            - regex:
                expression: 'task=(?P<task_id>\d+)'
            - labels:
                trace_id:
                task_id:
      # FFmpeg in stream-* is extremely chatty (one INFO per frame). Drop the
      # noise but keep anything that looks like an error or stream lifecycle event.
      - match:
          selector: '{unit=~"stream-.*"}'
          stages:
            - drop:
                expression: '\bframe=\s*\d+'   # standard ffmpeg progress line
                drop_counter_reason: ffmpeg_progress
            - drop:
                expression: 'speed=\s*[0-9.]+x'
                drop_counter_reason: ffmpeg_progress
      # Tag stream errors with a synthetic 'level' label so dashboards can
      # filter the same way as cff-* errors.
      - match:
          selector: '{unit=~"stream-.*"} |~ "(?i)error|failed|cannot"'
          stages:
            - labels:
                level: ERROR

  # ─── nginx (web layer ahead of cff-api) ─────────────────────────────
  - job_name: nginx-access
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          unit: nginx
          stream: access
          __path__: /var/log/nginx/*access*.log
    pipeline_stages:
      - regex:
          # combined log format
          expression: '^(?P<remote_ip>\S+) \S+ \S+ \[(?P<ts>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) [^"]*" (?P<status>\d+) (?P<bytes>\d+)'
      - labels:
          method:
          status:
      - match:
          selector: '{job="nginx",stream="access"}'
          stages:
            - template:
                source: level
                template: '{{ if regexMatch "^(2|3)" .Value }}INFO{{ else if regexMatch "^4" .Value }}WARNING{{ else }}ERROR{{ end }}'
            - labels:
                level:

  - job_name: nginx-error
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          unit: nginx
          stream: error
          level: ERROR
          __path__: /var/log/nginx/*error*.log

  # ─── auditd security log ───────────────────────────────────────────
  # /var/log/audit/audit.log entries look like:
  #   type=SYSCALL msg=audit(1234567890.123:NNN): arch=... key="cff-cron"
  # We extract the audit key (-k tag) and the type so dashboards can
  # filter by class of event without scanning the message body.
  - job_name: auditd
    static_configs:
      - targets: [localhost]
        labels:
          job: auditd
          unit: auditd
          __path__: /var/log/audit/audit.log
    pipeline_stages:
      - regex:
          expression: 'type=(?P<audit_type>\S+)\s+msg=audit\([^)]+\):'
      - regex:
          expression: 'key="(?P<audit_key>cff-[a-z-]+)"'
      - regex:
          expression: 'comm="(?P<comm>[^"]+)"'
      - regex:
          expression: 'addr=(?P<src_ip>[0-9.]+|\?)'
      - labels:
          audit_type:
          audit_key:
          comm:
      # Synthesize a level label so it integrates with our dashboards.
      # Anything tagged cff-* is at minimum NOTICE; failures escalate.
      - match:
          selector: '{job="auditd"} |~ "res=failed"'
          stages:
            - static_labels:
                level: ERROR
      - match:
          selector: '{job="auditd"} |~ "type=USER_ACCT|type=USER_LOGIN|type=CRED_ACQ"'
          stages:
            - static_labels:
                level: NOTICE
