server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # systemd journal — picks up everything cff-* and stream-* via journald
  - job_name: systemd-journal
    journal:
      max_age: 12h
      json: true
      labels:
        job: systemd-journal
      path: /var/log/journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_priority_keyword']
        target_label: severity
      - source_labels: ['__journal__hostname']
        target_label: host
      - source_labels: ['__journal_syslog_identifier']
        target_label: identifier
      # Keep only what we care about
      - source_labels: ['unit']
        regex: '(cff-.*|stream-.*)'
        action: keep
    pipeline_stages:
      # Try to parse the message body as JSON (we use python-json-logger in prod).
      # If it parses, hoist trace_id / task_id / level into Loki labels for fast filtering.
      - json:
          expressions:
            level: level
            trace_id: trace_id
            task_id: task_id
            logger: logger
            message: message
      - labels:
          level:
          trace_id:
          task_id:
          logger:
      # Fallback: if message wasn't JSON, regex out trace=... task=...
      - match:
          selector: '{job="systemd-journal"} !~ "^\\{"'
          stages:
            - regex:
                expression: 'trace=(?P<trace_id>[0-9a-f]{16,32})'
            - regex:
                expression: 'task=(?P<task_id>\d+)'
            - labels:
                trace_id:
                task_id:
