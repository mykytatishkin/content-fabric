[server]
http_port = 3000
# root_url is intentionally NOT set so Grafana derives it from the request
# Host header. That way the same instance works whether you reach it via
# http://127.0.0.1:3001 (the official tunnel), http://localhost:3001, or
# any other port forwarding the user happens to set up.
serve_from_sub_path = false

[security]
admin_user = ${GRAFANA_ADMIN_USER}
admin_password = ${GRAFANA_ADMIN_PASSWORD}
disable_initial_admin_creation = false
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
auto_assign_org_role = Viewer
home_page = /d/cff-now
default_home_dashboard_path = /var/lib/grafana/dashboards/now.json

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[unified_alerting]
enabled = true
execute_alerts = true
evaluation_timeout = 30s
ha_listen_address = 0.0.0.0:9094
ha_advertise_address = 0.0.0.0:9094

[alerting]
enabled = false  # legacy alerting off; use unified_alerting

[log]
mode = console
level = info
