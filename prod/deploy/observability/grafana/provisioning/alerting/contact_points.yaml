apiVersion: 1

# Notifications stay inside Grafana for now.
# Email contact point will be added manually via Grafana UI once SMTP creds
# and recipient address are provided. Adding it here with empty addresses
# fails validation, so we leave it out.

contactPoints:
  - orgId: 1
    name: cff-grafana-inbox
    receivers:
      - uid: grafana-inbox-default
        type: webhook
        # Loopback into Grafana itself — turns the alert into a dashboard
        # annotation + entry in Alerting → History. No external endpoint.
        settings:
          url: http://127.0.0.1:3000/api/annotations
          httpMethod: POST
          username: admin
          maxAlerts: 0
        disableResolveMessage: false
