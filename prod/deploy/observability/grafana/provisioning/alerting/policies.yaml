apiVersion: 1

policies:
  - orgId: 1
    receiver: cff-grafana-inbox
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical paged alerts go to email IF SMTP is configured.
      # Until then, ALERT_EMAIL_TO is empty and this contact point is a no-op.
      - receiver: cff-email-stub
        matchers:
          - severity = critical
        continue: true
        group_wait: 0s
        repeat_interval: 1h
