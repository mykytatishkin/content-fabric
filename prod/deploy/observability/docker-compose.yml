# Observability stack for Content Fabric
#
# All services bind to 127.0.0.1 only — access via SSH tunnel:
#   ssh -L 3001:127.0.0.1:3001 root@46.21.250.43   # Grafana
#   ssh -L 9090:127.0.0.1:9090 root@46.21.250.43   # Prometheus (debug only)
#
# Bring up:
#   cd /opt/content-fabric/prod/deploy/observability
#   docker compose --env-file .env up -d
#
# Retention: 30 days for both Prometheus and Loki.

name: cff-observability

x-restart: &restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Metrics: Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cff-prometheus
    <<: [*restart, *default-logging]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.listen-address=127.0.0.1:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    # Host network so Prometheus can scrape uvicorn (127.0.0.1:8000)
    # and process_exporter without docker network gymnastics.
    network_mode: host

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: cff-pushgateway
    <<: [*restart, *default-logging]
    command:
      - --persistence.file=/data/pushgateway.dat
      - --persistence.interval=5m
    volumes:
      - pushgateway-data:/data
    ports:
      - "127.0.0.1:9091:9091"

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: cff-node-exporter
    <<: [*restart, *default-logging]
    command:
      - --path.rootfs=/host
      - --collector.systemd
      - --collector.processes
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave

  process_exporter:
    image: ncabatoff/process-exporter:0.8.7
    container_name: cff-process-exporter
    <<: [*restart, *default-logging]
    command:
      - --procfs=/host/proc
      - --config.path=/config/process-exporter.yml
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - ./process-exporter/process-exporter.yml:/config/process-exporter.yml:ro
    ports:
      - "127.0.0.1:9256:9256"

  # ── Logs: Loki + Promtail ───────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: cff-loki
    <<: [*restart, *default-logging]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.2.1
    container_name: cff-promtail
    <<: [*restart, *default-logging]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail-data:/promtail
    depends_on:
      - loki

  # ── UI: Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: cff-grafana
    <<: [*restart, *default-logging]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://127.0.0.1:3001
      - GF_INSTALL_PLUGINS=
      - GF_LOG_LEVEL=info
      # SMTP wiring is intentionally a stub — real address provided later.
      - GF_SMTP_ENABLED=false
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=
      - GF_SMTP_PASSWORD=
      - GF_SMTP_FROM_ADDRESS=cff-alerts@example.invalid
      - GF_SMTP_FROM_NAME=CFF Observability
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki

  # ── Errors: GlitchTip (self-hosted Sentry-compatible) ───────────────
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: cff-glitchtip-postgres
    <<: [*restart, *default-logging]
    environment:
      - POSTGRES_USER=glitchtip
      - POSTGRES_PASSWORD=${GLITCHTIP_DB_PASSWORD:-glitchtip-local-secret}
      - POSTGRES_DB=glitchtip
    volumes:
      - glitchtip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    container_name: cff-glitchtip-redis
    <<: [*restart, *default-logging]
    volumes:
      - glitchtip-redis-data:/data

  glitchtip-web:
    image: glitchtip/glitchtip:v4.2.5
    container_name: cff-glitchtip-web
    <<: [*restart, *default-logging]
    environment: &glitchtip-env
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:-glitchtip-local-secret}@glitchtip-postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret-key-32chars-min}
      - PORT=8000
      - EMAIL_URL=consolemail://
      - GLITCHTIP_DOMAIN=http://127.0.0.1:8001
      - DEFAULT_FROM_EMAIL=glitchtip@example.invalid
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - ENABLE_OPEN_USER_REGISTRATION=False
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.2.5
    container_name: cff-glitchtip-worker
    <<: [*restart, *default-logging]
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      - glitchtip-web

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.2.5
    container_name: cff-glitchtip-migrate
    command: ./manage.py migrate
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
    restart: "no"

volumes:
  prometheus-data:
  pushgateway-data:
  loki-data:
  promtail-data:
  grafana-data:
  glitchtip-postgres-data:
  glitchtip-redis-data:
