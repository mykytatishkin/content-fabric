# /etc/audit/auditd.conf — CFF tuning
#
# Defaults rotate at 8MB → ~5min on a busy box. Bump to 50MB × 10 files
# = 500MB max for /var/log/audit. With promtail scraping → Loki, we don't
# need long on-disk retention.

local_events = yes
write_logs = yes
log_file = /var/log/audit/audit.log
log_group = adm
log_format = ENRICHED
flush = INCREMENTAL_ASYNC
freq = 50
max_log_file = 50
num_logs = 10
priority_boost = 4
name_format = NONE

# Rotation
max_log_file_action = ROTATE
space_left = 200
space_left_action = SYSLOG
admin_space_left = 100
admin_space_left_action = SUSPEND
disk_full_action = SUSPEND
disk_error_action = SUSPEND

# Network — local only (we ingest via promtail file scrape)
tcp_listen_port = 0
tcp_listen_queue = 5
tcp_max_per_addr = 1
use_libwrap = yes
tcp_client_max_idle = 0
enable_krb5 = no
krb5_principal = auditd

# DON'T use distribute — we read directly from the file
distribute_network = no
